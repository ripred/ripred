name: Update Recent Public Work

on:
  schedule:
    - cron: '23 5 * * *'
  workflow_dispatch:
    inputs:
      force_language_loc:
        description: Recount LOC for every public repo
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Update README
        run: python .github/scripts/update_recent_public_work.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ripred
          FORCE_LANGUAGE_LOC: ${{ github.event_name == 'workflow_dispatch' && inputs.force_language_loc || false }}

      - name: Commit changes
        run: |
          if git diff --quiet -- README.md assets/top-languages.svg assets/language-loc-cache.json; then
            echo "No profile content changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/top-languages.svg assets/language-loc-cache.json
          git commit -m "Update profile content"
          git push
