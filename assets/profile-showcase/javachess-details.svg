<svg xmlns="http://www.w3.org/2000/svg" width="820" height="360" role="img" aria-labelledby="title desc" viewBox="0 0 820 360">
<style>@keyframes pulse-ring{0%,100%{opacity:.28;transform:scale(1)}50%{opacity:.72;transform:scale(1.08)}}@keyframes draw-card{from{stroke-dashoffset:2500}to{stroke-dashoffset:0}}@keyframes accent-glow{0%,100%{opacity:.72}50%{opacity:1}}@keyframes stat-in{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}.pulse-ring{transform-box:fill-box;transform-origin:center;opacity:.34;animation:pulse-ring .9s ease-out .15s 1}.card-outline{stroke-dasharray:2500;stroke-dashoffset:2500;animation:draw-card 1.6s ease-out 0s 1 forwards}.accent-bar{animation:accent-glow 1.1s ease-out .2s 1}.stat{opacity:0;animation:stat-in .5s ease-out 0s 1 forwards}@media (prefers-reduced-motion: reduce){.pulse-ring,.card-outline,.accent-bar,.stat{animation:none;opacity:1;stroke-dashoffset:0;transform:none}}</style>
