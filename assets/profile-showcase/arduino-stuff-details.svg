<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" role="img" aria-labelledby="title desc" viewBox="0 0 820 420">
<style>@keyframes pulse-ring{0%,100%{opacity:.28;transform:scale(1)}50%{opacity:.72;transform:scale(1.08)}}@keyframes draw-card{from{stroke-dashoffset:2500}to{stroke-dashoffset:0}}@keyframes accent-glow{0%,100%{opacity:.72}50%{opacity:1}}@keyframes stat-in{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}svg .hover-lift{transition:transform .24s ease,opacity .24s ease}svg:hover .hover-lift{transform:translateY(-2px)}svg:hover .hover-bright{opacity:1}.pulse-ring{transform-box:fill-box;transform-origin:center;animation:pulse-ring 3.8s ease-in-out infinite}.card-outline{stroke-dasharray:2500;stroke-dashoffset:2500;animation:draw-card 1.6s ease-out forwards}.accent-bar{animation:accent-glow 4.2s ease-in-out infinite}.stat{opacity:0;animation:stat-in .5s ease-out forwards}@media (prefers-reduced-motion: reduce){.pulse-ring,.card-outline,.accent-bar,.stat{animation:none;opacity:1;stroke-dashoffset:0;transform:none}}</style>
